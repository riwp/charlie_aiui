{% extends 'base.html' %}
{% block content %}
<div class="row mb-4">
    <div class="col-12">
        <div class="p-3 bg-white rounded shadow-sm border-start border-4 border-dark d-flex justify-content-between align-items-center flex-wrap gap-2">
            <div>
                <h2 class="fw-bold text-dark m-0 d-flex align-items-center gap-2">
                    🖥️ {{ index_title }}
                </h2>
                <p class="text-muted small m-0 mt-1">{{ description }}</p>
            </div>
        </div>
    </div>
</div>

<div class="row g-3">
    {% for card in cards %}
    <div class="col-12 col-md-6 col-lg-3">
        <a href="{{ card.url }}" class="card h-100 border-0 shadow-sm bg-white rounded position-relative text-decoration-none dashboard-app-card" style="cursor: pointer;">
            <div class="position-absolute top-0 bottom-0 start-0 bg-{{ card.color }} rounded-start" style="width: 4px;"></div>
            
            <div class="position-absolute top-0 end-0 mt-3 me-3 text-{{ card.color }} app-arrow-indicator">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" fill="currentColor" class="bi bi-arrow-right-short" viewBox="0 0 16 16">
                    <path fill-rule="evenodd" d="M4 8a.5.5 0 0 1 .5-.5h5.793L8.146 5.354a.5.5 0 1 1 .708-.708l3 3a.5.5 0 0 1 0 .708l-3 3a.5.5 0 0 1-.708-.708L10.293 8.5H4.5A.5.5 0 0 1 4 8z"/>
                </svg>
            </div>

            <div class="card-body d-flex flex-column ps-4 pe-4 pt-3 pb-3">
                <h5 class="card-title fw-bold mb-2 text-dark pe-3">{{ card.title }}</h5>
                <p class="card-text text-muted small m-0" style="line-height: 1.45;">{{ card.description }}</p>
            </div>
        </a>
    </div>
    {% endfor %}
</div>

<style>
    .dashboard-app-card {
        transition: transform 0.2s cubic-bezier(0.16, 1, 0.3, 1), box-shadow 0.2s ease, background-color 0.2s ease !important;
    }
    
    .app-arrow-indicator {
        transition: transform 0.2s ease-in-out, opacity 0.2s ease !important;
        opacity: 0.6;
    }

    /* Snappy Hover Interactive Logic */
    .dashboard-app-card:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 20px rgba(0,0,0,0.06) !important;
        background-color: #fafbfc !important;
    }

    /* Micro-nudge the arrow to indicate clickability */
    .dashboard-app-card:hover .app-arrow-indicator {
        transform: translateX(3px);
        opacity: 1;
    }
</style>
{% endblock %}
