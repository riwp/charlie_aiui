{% extends 'base.html' %}
{% block content %}
<div class="card p-4">
    <div class="card-body">
        <h1 class="fw-bold mb-1 text-capitalize text-dark">{{ title }}</h1>
        <p class="text-muted mb-4">{{ description }}</p>
        
        <form action="{{ url_for(request.blueprint ~ '.manage_notes_view', pagetype=pagetype) }}" method="POST">
            <div class="mb-4">
                <label for="page_text" class="form-label fw-bold small text-muted text-uppercase tracking-wider">Document Rich Payload Buffer Canvas Stream</label>
                <textarea class="form-control font-monospace p-3 bg-light text-dark border" id="page_text" name="page_text" rows="18" placeholder="Begin typing data entries text stream patterns logger notes logs here data parameters formatting blocks contents info metrics layouts details... Balancing energy output tracking matrix details.">{{ text_content }}</textarea>
            </div>
            <div class="d-flex justify-content-end align-items-center">
                <button type="submit" class="btn btn-{{ theme_color or 'success' }} px-4 fw-semibold shadow-sm">Save Text Changes Data Log</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
