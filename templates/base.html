<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ app_title }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #f4f6f9; font-variant-numeric: tabular-nums; }
        .card { border: none; box-shadow: 0 4px 10px rgba(0,0,0,0.03); border-radius: 12px; }
        .navbar { letter-spacing: -0.2px; }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4 sticky-top shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🚀 {{ app_title }}</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navContainer"><span class="navbar-toggler-icon"></span></button>
            <div class="collapse navbar-collapse" id="navContainer">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    {% for link in nav_links %}
                    <li class="nav-item">
                        <a class="nav-link fw-medium text-white" href="{{ link.url }}">{{ link.name }}</a>
                    </li>
                    {% endfor %}
                </ul>
            </div>
        </div>
    </nav>
    <div class="container pb-5">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
